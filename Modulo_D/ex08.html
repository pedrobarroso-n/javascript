<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios em JS</title>
    <link rel="stylesheet" href="exercicios/estilo-2.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>
    <section>
        <div>
            <p>Ano de nascimento:
                <input type="number" name="nasc" id="nasc">
            </p>
            <p>Sexo:
                <input type="radio" name="sex" id="M"><label for="M">Masculino</label>
                <input type="radio" name="sex" id="F"><label for="F">Feminino</label>
            </p>
            <p>
                <input type="button" value="Verificar" onclick="verificar()">
            </p>
        </div>
        <div id="res">
            Preencha os dados acima para ter um resultado
        </div>
    </section>
    <script src="exercicios/script-2.js"></script>
</body>
</html>
